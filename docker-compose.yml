services:
  backend:
    build:
      context: ./backend
    environment:
      - OLLIVE_DB_URL=sqlite:////data/ollive.sqlite3
      - OLLIVE_INGEST_API_KEY=${OLLIVE_INGEST_API_KEY:-dev-ingest-key}
      - OLLIVE_LLM_PROVIDER=${OLLIVE_LLM_PROVIDER:-mock}
      - OLLIVE_LLM_MODEL=${OLLIVE_LLM_MODEL:-mock-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ollive_data:/data

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:8000
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  ollive_data:

